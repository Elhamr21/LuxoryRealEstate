version: 1
env:
  variables:
    NODE_VERSION: 22
    PNPM_VERSION: 10.12.3
backend:
  phases:
    build:
      commands:
        - nvm use $NODE_VERSION
        - corepack enable
        - corepack prepare pnpm@$PNPM_VERSION --activate
        - pnpm config set store-dir .pnpm-store
        - pnpm install --frozen-lockfile
        - pnpm exec ampx pipeline-deploy --debug --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - nvm use $NODE_VERSION
        - corepack enable
        - corepack prepare pnpm@$PNPM_VERSION --activate
        - pnpm config set store-dir .pnpm-store
        - pnpm install --frozen-lockfile
        - printf 'NEXT_PUBLIC_GA_MEASUREMENT_ID=%s\n' "$NEXT_PUBLIC_GA_MEASUREMENT_ID" > .env.production
        - mkdir -p public
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .pnpm-store/**/*
