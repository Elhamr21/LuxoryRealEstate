version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 20
        - npm install --no-audit --no-fund
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npm install --no-audit --no-fund
        - mkdir -p public
        - test ! -f amplify_outputs.json || cp amplify_outputs.json public/amplify_outputs.json
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
